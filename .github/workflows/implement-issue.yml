name: Implement Issue

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  implement:
    if: >
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||
      (github.event_name == 'issue_comment' && github.event.comment.body == '/claude' && !github.event.issue.pull_request)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'claude[bot]'
          trigger_phrase: "/claude"
          prompt: |
            You are working on PluginUpdater, a native macOS SwiftUI app for managing audio plugin updates (VST3, AU, CLAP).

            A GitHub issue has been filed above. Your job:

            1. Read and understand the issue thoroughly (it may be a feature request, bug fix, enhancement, etc.)
            2. Plan the implementation — identify which files need changes and what the approach should be
            3. Implement the changes with clean, minimal code
            4. Write tests for your changes:
               - Add unit tests that prove the new behavior works as expected
               - Cover important edge cases and error conditions
               - Place tests in the appropriate test file under PluginUpdater/PluginUpdaterTests/
               - Follow existing test patterns (XCTest, @Suite, in-memory SwiftData containers)
            5. Make sure the project builds: run `cd PluginUpdater && swift build`
            6. Run ALL tests to verify nothing is broken: `cd PluginUpdater && swift test`
            7. If you added or removed source files, regenerate the Xcode project: `cd PluginUpdater && xcodegen generate`
            8. Create a PR **targeting the `dev` branch** with a clear summary linking back to this issue using "Closes #<issue_number>". Use `gh pr create --base dev`.

            Key project details:
            - Swift/SwiftUI, SwiftData, macOS 14+, no third-party dependencies
            - Build: `cd PluginUpdater && swift build` / `swift test`
            - Xcode project: `cd PluginUpdater && xcodegen generate` (run if you add/remove files)
            - Views are in PluginUpdater/PluginUpdater/Views/
            - Services in PluginUpdater/PluginUpdater/Services/
            - Models in PluginUpdater/PluginUpdater/Models/
            - Tests in PluginUpdater/PluginUpdaterTests/
            - Resources (JSON configs, assets) in PluginUpdater/PluginUpdater/Resources/
          claude_args: "--model claude-sonnet-4-6 --allowedTools 'Bash(git:*)' 'Bash(swift:*)' 'Bash(xcodegen:*)' 'Bash(gh:*)' 'Bash(ls:*)' 'Bash(mkdir:*)' 'Bash(cp:*)' 'Bash(mv:*)' 'Bash(cat:*)' 'Bash(cd:*)' 'Edit' 'Write' 'Read' 'Glob' 'Grep'"
