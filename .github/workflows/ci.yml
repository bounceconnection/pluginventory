name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        run: ./scripts/generate-version.sh

      - name: Build
        working-directory: PluginUpdater
        run: swift build

      - name: Run tests
        working-directory: PluginUpdater
        run: swift test

      - name: SwiftLint
        run: |
          brew install swiftlint || true
          swiftlint lint --config .swiftlint.yml --reporter github-actions-logging
