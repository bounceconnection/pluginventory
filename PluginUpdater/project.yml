name: PluginUpdater
options:
  bundleIdPrefix: com.bounceconnection
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  PluginUpdater:
    type: application
    platform: macOS
    sources:
      - path: PluginUpdater
        excludes:
          - "Resources/**"
      - path: PluginUpdater/Resources
        buildPhase: resources
    entitlements:
      path: PluginUpdater/PluginUpdater.entitlements
      properties:
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bounceconnection.PluginUpdater
        PRODUCT_NAME: PluginUpdater
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Plugin Updater"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_LSUIElement: NO
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    preBuildScripts:
      - name: Generate Version from Git
        script: |
          "${PROJECT_DIR}/../scripts/generate-version.sh"
        outputFiles:
          - $(SRCROOT)/PluginUpdater/Generated/AppVersion.swift

  PluginUpdaterTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PluginUpdaterTests
    dependencies:
      - target: PluginUpdater
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bounceconnection.PluginUpdaterTests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
