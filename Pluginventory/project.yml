name: Pluginventory
options:
  bundleIdPrefix: com.bounceconnection
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  Pluginventory:
    type: application
    platform: macOS
    sources:
      - path: Pluginventory
        excludes:
          - "Resources/**"
      - path: Pluginventory/Resources
        buildPhase: resources
    entitlements:
      path: Pluginventory/Pluginventory.entitlements
      properties:
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bounceconnection.Pluginventory
        PRODUCT_NAME: Pluginventory
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Pluginventory"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_LSUIElement: NO
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    preBuildScripts:
      - name: Generate Version from Git
        script: |
          "${PROJECT_DIR}/../scripts/generate-version.sh"
        outputFiles:
          - $(SRCROOT)/Pluginventory/Generated/AppVersion.swift

  PluginventoryTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PluginventoryTests
    dependencies:
      - target: Pluginventory
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bounceconnection.PluginventoryTests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
